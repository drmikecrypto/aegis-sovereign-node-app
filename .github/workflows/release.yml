name: Release Source Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source bundle
        run: |
          mkdir -p release
          cp -r cli release/cli
          cp -r desktop release/desktop
          cp -r docs release/docs
          cp -r mobile release/mobile
          cp -r shared release/shared
          cp README.md release/
          (cd release && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          (cd release && zip -r "../${{ github.event.repository.name }}-${{ github.ref_name }}.zip" .)
          sha256sum "${{ github.event.repository.name }}-${{ github.ref_name }}.zip" > "${{ github.event.repository.name }}-${{ github.ref_name }}.zip.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-${{ github.ref_name }}.zip
            ${{ github.event.repository.name }}-${{ github.ref_name }}.zip.sha256
